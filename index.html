<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Menina Que Roubava Livros</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="site-container">
        <!-- MENU -->
        <header class="header">
            <div class="header-container">
                <nav class="menu">
                    <a href="#"> Capítulos </a>
                    <a href="#"> Personagens </a>
                    <a href="#"> Curiosidade </a>
                    <a href="#"> Saiba Mais </a>
                </nav>
                <div class="barra-pesquisa">
                    <input type="text" placeholder="Pesquisar">
                    <button> 🔎 </button>
                </div>
            </div>
        </header>

        <!-- CONTEÚDO PRINCIPAL -->
        <main>

            <!-- CAPA / HERO -->
            <section class="hero">
                <div class="hero-overlay">
                    <img src="img/capa-livro.png" alt="Capa do Livro" class="hero-imagem">
                </div>
            </section>

            <!-- DIVISOR -->
            <section class="divisor">
                <div class="arabesco">
                    <img src="img/arabesco.png">
                </div>
            </section>

            <!-- CAPÍTULOS -->
            <section class="capitulos">
                <div class="capitulos-container">
                    <button class="capitulo-card">
                        Capítulo 1
                        <span>Ler</span>
                    </button>
                    <button class="capitulo-card">
                        Capítulo 2
                        <span>Ler</span>
                    </button>
                    <button class="capitulo-card">
                        Capítulo 3
                        <span>Ler</span>
                    </button>
                    <button class="capitulo-card">
                        Capítulo 4
                        <span>Ler</span>
                    </button>
                    <button class="capitulo-card">
                        Capítulo 5
                        <span>Ler</span>
                    </button>
                    <button class="capitulo-card">
                        Capítulo 6
                        <span>Ler</span>
                    </button>
                </div>
            </section>

            <!-- PERSONAGENS -->
            <section class="personagens">
                <div class="personagens-container">
                    <article class="personagem-card">
                        <img src="img/liesel.png" alt="Liesel">
                    </article>
                    <article class="personagem-card">
                        <img src="img/morte.png">
                    </article>
                    <article class="personagem-card">
                        <img src="img/rosa.png">
                    </article>
                    <article class="personagem-card">
                        <img src="img/hans.png">
                    </article>
                    <article class="personagem-card">
                        <img src="img/rudy.png">
                    </article>
                    <article class="personagem-card">
                        <img src="img/max.png">
                    </article>
                </div>
            </section>

            <!-- DIVISOR -->
            <section class="divisor">
                <div class="arabesco">
                    <img src="img/arabesco.png">
                </div>
            </section>

            <!-- CURIOSIDADE -->
            <section class="curiosidade">
                <div class="curiosidade-card">
                    <h2> Quantos livros Liesel roubou? </h2>
                    <div class="opcoes">
                        <button> 11 </button>
                        <button> 18 </button>
                        <button> 23 </button>
                        <button> 14 </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>

<footer class="footer">
    <div class="footer-inner">
        <span class="footer-copy">
            © 2005
        </span>
    </div>
</footer>

</html>
